[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0
loglevel=info
user=root

[program:whatsapp-bridge]
command=/app/whatsapp-bridge/whatsapp-bridge
directory=/app/whatsapp-bridge
autostart=true
autorestart=true
startsecs=2
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:whatsapp-mcp-server]
command=/usr/local/bin/mcpo --port 8000 -- /app/whatsapp-mcp-server/.venv/bin/python /app/whatsapp-mcp-server/main.py
directory=/app/whatsapp-mcp-server
autostart=true
autorestart=true
startsecs=5
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
